<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Physics Dashboard</title>
        <link rel="stylesheet" href="styles.css">
        <style>
            .dashboard-container {
                display: flex;
                justify-content: center;
                align-items: flex-start;
                gap: 20px;
                padding: 20px;
            }
            #canvas-container {
                width: 800px;
                height: 600px;
                background-color: #000;
                border-radius: 10px;
                overflow: hidden;
            }
        </style>
    </head>

    <body>
        <div class="dashboard-container">
            <div id="canvas-container">
                <canvas id="physicsCanvas"></canvas>
            </div>

            <div class="sidebar">
                <h2>Simulation Controls</h2>

                <div class="info-box">
                    <strong>How to Play: </strong>
                    <ul>
                        <li><strong>Click</strong> to spawn a particle.</li>
                        <li><strong>Hold & Drag</strong> to push particles with a mouse controlled force.</li>
                    </ul>
                </div>
                
                <label>Gravity</label>
                <input type="range" id="gravity" min="0" max="2" step="0.1" value="0.5">

                <label>Bounciness</label>
                <input type="range" id="bounce" min="0" max="1" step="0.05" value="0.8">

                <label>Repulsion</label>
                <input type="range" id="repulsion" min="0" max="2" step="0.1" value="0">

                <label>
                    <input type="checkbox" id="airToggle" checked>
                    Air Resistance
                </label>
                
                <hr style="border-color: #333; margin: 15px 0;">
                
                <button onclick="saveSimulation()">Save Simulation</button>
                <button onclick="window.engine.clearAll()" style="background: #f39c12; margin-top: 10px;">Clear Canvas</button>
                <button onclick="logout()" style="background: #cc0000; margin-top: 10px;">Logout</button>
                
                <div id="sim-list">
                    </div>
            </div>
        </div>

        <script src="vector.js"></script>
        <script src="particle.js"></script>
        <script src="spark.js"></script>
        <script src="engine.js"></script>

        <script src="api.js"></script>
        <script src="dashboard.js"></script>
        <script src="controls.js"></script>

    </body>
</html>
